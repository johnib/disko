name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check
        run: python3 -m py_compile $(find . -name "*.py" -not -path "./.git/*")

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 . --max-line-length=120 --exclude=.git
